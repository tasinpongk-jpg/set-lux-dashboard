name: Lux Scanner — Daily SET Scan

# Runs Mon–Fri at 11:30 UTC = 18:30 Bangkok (2 hours after SET 16:30 close).
# Downloads Yahoo Finance data, computes Lux Algo-equivalent signals for
# ~139 SET tickers, calls Claude for a 3-sentence brief, commits
# data/lux-scanner.json, and deploys to Cloudflare Workers.
#
# Secrets required:
#   ANTHROPIC_API_KEY     — Claude AI brief
#   CLOUDFLARE_API_TOKEN  — Workers deploy

on:
  schedule:
    - cron: '30 11 * * 1-5'   # 18:30 Bangkok Mon–Fri
  workflow_dispatch:            # manual trigger from Actions tab

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: lux-scanner
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Lux Scanner
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PYTHONIOENCODING: utf-8
        run: python scripts/build_lux_scanner.py

      - name: Commit and push data
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/lux-scanner.json
          if git diff --staged --quiet; then
            echo "No changes — skipping commit."
            exit 0
          fi
          git commit -m "lux scan $(date -u +%Y-%m-%d)"
          for attempt in 1 2 3; do
            if git push origin main; then
              echo "Push succeeded on attempt $attempt."
              exit 0
            fi
            echo "Attempt $attempt failed — rebasing..."
            git rebase --abort 2>/dev/null || true
            git pull --rebase origin main
            sleep $((attempt * 5))
          done
          echo "Push failed after 3 attempts."
          exit 1

      - name: Deploy to Cloudflare Workers
        if: github.ref == 'refs/heads/main'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler deploy
